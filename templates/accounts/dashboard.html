<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;
            background:#f4f6f9;
        }

        .navbar{
            background:#2c3e50;
            color:white;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .navbar h2{
            margin:0;
        }

        .logout-btn{
            text-decoration:none;
            color:white;
            background:#e74c3c;
            padding:10px 18px;
            border-radius:8px;
        }

        .logout-btn:hover{
            background:#c0392b;
        }

        .container{
            max-width:1000px;
            margin:50px auto;
            padding:20px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .card h1{
            color:#2c3e50;
            margin-bottom:15px;
        }

        .card p{
            font-size:18px;
            color:#666;
        }

        .menu{
            margin-top:30px;
            display:flex;
            gap:20px;
        }

        .menu a{
            text-decoration:none;
            padding:12px 20px;
            background:#3498db;
            color:white;
            border-radius:8px;
        }

        .menu a:hover{
            background:#2980b9;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <h2>Dashboard</h2>

        <a href="{% url 'logout' %}" class="logout-btn">
            Logout
        </a>
    </div>

    <div class="container">

        <div class="card">

            <h1>
                Welcome {{ request.user.username }}
            </h1>

            <p>
                You have successfully logged in.
            </p>

            <div class="menu">
                <a href="/books/">
                    View Books
                </a>

                <a href="/admin/">
                    Admin Panel
                </a>
            </div>

        </div>

    </div>

</body>
</html>
