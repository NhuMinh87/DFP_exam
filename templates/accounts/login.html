<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#3498db,#2c3e50);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:15px;
            width:400px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#2c3e50;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:16px;
        }

        input:focus{
            outline:none;
            border-color:#3498db;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#3498db;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#2980b9;
        }

        .errorlist{
            color:red;
            margin-bottom:15px;
            list-style:none;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h1>🔐 Login</h1>

    <form method="post">
        {% csrf_token %}

        {{ form.non_field_errors }}

        <div class="form-group">
            <label>Username</label>
            {{ form.username }}
        </div>

        <div class="form-group">
            <label>Password</label>
            {{ form.password }}
        </div>

        <button type="submit">
            Login
        </button>
    </form>

</div>

</body>
</html>
