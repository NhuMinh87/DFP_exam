<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Management</title>

```
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#f4f6f9;
        padding:40px;
    }

    .container{
        max-width:1100px;
        margin:auto;
        background:white;
        padding:30px;
        border-radius:15px;
        box-shadow:0 5px 20px rgba(0,0,0,.15);
    }

    .header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:25px;
    }

    h1{
        color:#2c3e50;
    }

    .btn-add{
        background:#27ae60;
        color:white;
        padding:12px 20px;
        border-radius:8px;
        text-decoration:none;
        font-weight:bold;
    }

    .btn-add:hover{
        background:#219150;
    }

    table{
        width:100%;
        border-collapse:collapse;
    }

    thead{
        background:#3498db;
        color:white;
    }

    th, td{
        padding:15px;
        text-align:left;
    }

    tbody tr{
        border-bottom:1px solid #ddd;
    }

    tbody tr:hover{
        background:#f8f9fa;
    }

    .price{
        color:#27ae60;
        font-weight:bold;
    }

    .btn{
        padding:8px 12px;
        border-radius:6px;
        text-decoration:none;
        color:white;
        font-size:14px;
        margin-right:5px;
    }

    .btn-edit{
        background:#f39c12;
    }

    .btn-edit:hover{
        background:#d68910;
    }

    .btn-delete{
        background:#e74c3c;
    }

    .btn-delete:hover{
        background:#c0392b;
    }

    .empty{
        text-align:center;
        padding:30px;
        color:#777;
    }
</style>
```

</head>
<body>

<div class="container">

```
<div class="header">
    <h1>📚 Book Management</h1>

    <a href="/books/add/" class="btn-add">
        + Add Book
    </a>
</div>

<table>

    <thead>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Price ($)</th>
            <th>Created At</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>

    {% for book in books %}
        <tr>
            <td>{{ book.title }}</td>

            <td>{{ book.author }}</td>

            <td class="price">
                ${{ book.price }}
            </td>

            <td>
                {{ book.created_at|date:"d/m/Y H:i" }}
            </td>

            <td>
                <a
                    href="/books/edit/{{ book.id }}/"
                    class="btn btn-edit"
                >
                    Edit
                </a>

                <a
                    href="/books/delete/{{ book.id }}/"
                    class="btn btn-delete"
                    onclick="return confirm('Delete this book?')"
                >
                    Delete
                </a>
            </td>
        </tr>
    {% empty %}
        <tr>
            <td colspan="5" class="empty">
                No books found.
            </td>
        </tr>
    {% endfor %}

    </tbody>

</table>
```

</div>

</body>
</html>
