<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Book</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:500px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#2c3e50;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#555;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        input:focus{
            outline:none;
            border-color:#3498db;
            box-shadow:0 0 5px rgba(52,152,219,0.4);
        }

        .button-group{
            display:flex;
            gap:10px;
            margin-top:25px;
        }

        .btn{
            flex:1;
            padding:12px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
            text-decoration:none;
            text-align:center;
        }

        .btn-update{
            background:#27ae60;
            color:white;
        }

        .btn-update:hover{
            background:#219150;
        }

        .btn-back{
            background:#95a5a6;
            color:white;
        }

        .btn-back:hover{
            background:#7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>✏️ Edit Book</h1>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Book Title</label>
            <input
                type="text"
                name="title"
                value="{{ book.title }}"
                required
            >
        </div>

        <div class="form-group">
            <label>Author</label>
            <input
                type="text"
                name="author"
                value="{{ book.author }}"
                required
            >
        </div>

        <div class="form-group">
            <label>Price ($)</label>
            <input
                type="number"
                step="0.01"
                name="price"
                value="{{ book.price }}"
                required
            >
        </div>

        <div class="button-group">
            <button type="submit" class="btn btn-update">
                Update Book
            </button>

            <a href="/books/" class="btn btn-back">
                Back
            </a>
        </div>

    </form>

</div>

</body>
</html>
