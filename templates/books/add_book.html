<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book</title>

```
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#f4f6f9;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .container{
        width:500px;
        background:white;
        padding:40px;
        border-radius:15px;
        box-shadow:0 5px 20px rgba(0,0,0,0.15);
    }

    h1{
        text-align:center;
        color:#2c3e50;
        margin-bottom:30px;
    }

    .form-group{
        margin-bottom:20px;
    }

    label{
        display:block;
        margin-bottom:8px;
        font-weight:bold;
        color:#555;
    }

    input{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:16px;
        transition:0.3s;
    }

    input:focus{
        outline:none;
        border-color:#3498db;
        box-shadow:0 0 6px rgba(52,152,219,0.3);
    }

    .button-group{
        display:flex;
        gap:10px;
        margin-top:25px;
    }

    .btn{
        flex:1;
        padding:12px;
        border:none;
        border-radius:8px;
        font-size:16px;
        cursor:pointer;
        text-decoration:none;
        text-align:center;
    }

    .btn-save{
        background:#27ae60;
        color:white;
    }

    .btn-save:hover{
        background:#219150;
    }

    .btn-back{
        background:#95a5a6;
        color:white;
    }

    .btn-back:hover{
        background:#7f8c8d;
    }
</style>
```

</head>
<body>

<div class="container">

```
<h1>📚 Add New Book</h1>

<form method="post">
    {% csrf_token %}

    <div class="form-group">
        <label>Book Title</label>
        <input
            type="text"
            name="title"
            placeholder="Enter book title"
            required
        >
    </div>

    <div class="form-group">
        <label>Author</label>
        <input
            type="text"
            name="author"
            placeholder="Enter author name"
            required
        >
    </div>

    <div class="form-group">
        <label>Price ($)</label>
        <input
            type="number"
            name="price"
            step="0.01"
            placeholder="Enter price"
            required
        >
    </div>

    <div class="button-group">
        <button type="submit" class="btn btn-save">
            Save Book
        </button>

        <a href="/books/" class="btn btn-back">
            Back
        </a>
    </div>

</form>
```

</div>

</body>
</html>
